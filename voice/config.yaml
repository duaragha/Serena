wake_word:
  model_path: "models/hey_serena.onnx"
  threshold: 0.5

stt:
  engine: "groq"  # "groq" (cloud, fast, accurate, needs GROQ_API_KEY) or "local"
  model: "whisper-large-v3-turbo"  # for groq; or "base.en"/"small.en" for local
  device: "cpu"
  language: "en"

tts:
  engine: "kokoro"
  piper_model: "en_US-amy-medium"
  speed: 1.1

llm:
  default_model: "claude-haiku-4-5-20251001"
  complex_model: "claude-sonnet-4-6"
  max_context_turns: 20

daemon:
  morning_briefing: "07:30"
  evening_summary: "18:00"
  meeting_prep_minutes: 15
  quiet_hours_start: "23:00"
  quiet_hours_end: "07:00"
  daily_message_cap: 8
  hourly_message_cap: 2
  cooldown_minutes: 10

calendar:
  credentials_path: "~/.config/serena/google_credentials.json"
  poll_interval_minutes: 5

email:
  imap_server: ""
  username: ""
  app_password: ""

weather:
  latitude: 43.6834
  longitude: -79.7663
  units: "celsius"

ui:
  overlay_opacity: 0.85
  animation_fps: 30
  dashboard_enabled: true

notifications:
  ntfy_topic: ""
