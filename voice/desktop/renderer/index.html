<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
  <title>Serena</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Main widget — fills the proper OS window */
    html, body {
      background: #0a0a1a;
    }
    #widget {
      position: fixed;
      inset: 0;
      background: radial-gradient(
        ellipse at center,
        #0e1428 0%,
        #06070f 100%
      );
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* Subtle inner top-light highlight for that premium feel */
    #widget::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(120, 180, 255, 0.4) 50%,
        transparent 100%
      );
      pointer-events: none;
    }
    /* Header with state indicator */
    #widget-header {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      z-index: 2;
    }
    /* Brain takes the rest of the widget */
    #brain-container {
      flex: 1;
      position: relative;
      min-height: 0;
      z-index: 0;
    }
    #brain-container canvas {
      -webkit-app-region: no-drag;
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
    /* Overlay sits on top of brain, inside the widget */
    #overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    /* Make interactive elements receive clicks */
    #overlay > * {
      pointer-events: auto;
    }
    /* Hide the original state-indicator — now lives in header */
    #overlay #state-indicator {
      display: none;
    }
  </style>
</head>
<body>
  <div id="widget">
    <!-- Header: state indicator at top of widget -->
    <div id="widget-header">
      <div id="state-dot"></div>
      <span id="state-label">offline</span>
    </div>

    <!-- Brain visualization fills the rest of the widget -->
    <div id="brain-container"></div>
  </div>

  <div id="overlay">
    <!-- Old state indicator (hidden, kept for backwards compat) -->
    <div id="state-indicator">
      <div id="state-dot-legacy"></div>
      <span id="state-label-legacy">offline</span>
    </div>

    <!-- Transcription / response text area -->
    <div id="text-area">
      <div id="transcription" class="text-block hidden"></div>
      <div id="response" class="text-block hidden"></div>
    </div>

    <!-- Dashboard panel (hidden by default) -->
    <div id="dashboard" class="hidden">
      <div class="dashboard-section">
        <h3>Calendar</h3>
        <div id="dash-calendar"><span class="muted">No events</span></div>
      </div>
      <div class="dashboard-section">
        <h3>Weather</h3>
        <div id="dash-weather"><span class="muted">--</span></div>
      </div>
      <div class="dashboard-section">
        <h3>Notifications</h3>
        <div id="dash-notifications"><span class="muted">None</span></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <!-- Import map so unmodified Three.js addons (which import from 'three')
       resolve locally with no CDN, honoring the strict CSP. -->
  <script type="importmap">
    {
      "imports": {
        "three": "./three.min.js",
        "three/addons/": "./three-addons/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    window.THREE = THREE;

    import { BrainVisualizer } from './brain.js';
    import { TranscriptionDisplay } from './transcription.js';
    import { Dashboard } from './dashboard.js';
    import { NotificationManager } from './notifications.js';
    import { CodePanel } from './code-panel.js';

    const container = document.getElementById('brain-container');
    const brain = new BrainVisualizer(container);
    const transcription = new TranscriptionDisplay(container);
    const dashboard = new Dashboard(document.body);
    const notifications = new NotificationManager(document.body);

    // Register brain visualization callbacks via the preload bridge
    window.serena.registerBrain({
      setState: (state) => brain.setState(state),
      showUserText: (text) => transcription.showUserText(text),
      showResponseText: (text) => transcription.showResponseText(text),
      clearText: () => transcription.clear(),
    });

    // Code output panel
    const codePanel = new CodePanel(document.body);

    // Register code panel callbacks via the preload bridge
    window.serena.registerCodePanel({
      onStart: (data) => {
        codePanel.clear();
        codePanel.setStatus(`working on ${data.project || 'project'}...`);
        codePanel.show();
      },
      onEvent: (event) => {
        codePanel.addEvent(event);
      },
      onDone: (data) => {
        codePanel.setStatus('done');
      },
      onToggle: () => {
        codePanel.toggle();
      },
    });

    // Store references for dashboard/notifications (accessible via closure)
    window._serenaDashboard = dashboard;
    window._serenaNotifications = notifications;
    window._serenaCodePanel = codePanel;
  </script>
</body>
</html>
